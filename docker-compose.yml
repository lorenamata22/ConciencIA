version: '3.8'

services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: conciencia_postgres
    environment:
      POSTGRES_USER: conciencia
      POSTGRES_PASSWORD: conciencia
      POSTGRES_DB: conciencia_dev
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: conciencia_redis
    ports:
      - '6379:6379'

volumes:
  postgres_data: